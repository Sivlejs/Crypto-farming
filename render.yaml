services:
  - type: web
    name: nexus-ai-crypto-farmer
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      # === REQUIRED: Set these in Render Dashboard ===
      # WALLET_ADDRESS       - Your wallet public address
      # WALLET_PRIVATE_KEY   - Your wallet private key (keep secret!)
      # ETH_RPC_URL          - Ethereum RPC endpoint (e.g. Infura/Alchemy)
      # BSC_RPC_URL          - BNB Smart Chain RPC endpoint
      # POLYGON_RPC_URL      - Polygon RPC endpoint
      # === OPTIONAL ===
      # COINGECKO_API_KEY    - CoinGecko API key for price data
      # MIN_PROFIT_USD       - Minimum profit threshold in USD (default: 5.0)
      # MAX_GAS_GWEI         - Maximum gas price in Gwei (default: 50)
      # DRY_RUN              - Set to "true" to simulate without real transactions

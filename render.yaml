envVarGroups:
  - name: nexus-ai-secrets
    envVars:
      - key: WALLET_ADDRESS
        sync: false
      - key: WALLET_PRIVATE_KEY
        sync: false
      - key: ETH_RPC_URL
        sync: false
      - key: BSC_RPC_URL
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: FLASHBOTS_SIGNING_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

services:
  # ══════════════════════════════════════════════════════════════
  # WEB LAYER
  # ══════════════════════════════════════════════════════════════

  # ── Web Dashboard + API Gateway ─────────────────────────────────
  - type: web
    name: nexus-ai-web
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"
      - key: SERVICE_ROLE
        value: "web"
      - key: REDIS_URL
        fromService:
          name: nexus-ai-redis
          type: redis
          property: connectionString
      - fromGroup: nexus-ai-secrets

  # ══════════════════════════════════════════════════════════════
  # CORE WORKER
  # ══════════════════════════════════════════════════════════════

  # ── Background Worker (Core Farming Execution) ──────────────────
  - type: worker
    name: nexus-ai-worker
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python nexus/worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SERVICE_ROLE
        value: "worker"
      - key: MINING_VGPU_ENABLED
        value: "true"
      - key: MINING_VGPU_COUNT
        value: "1"
      - key: MINING_VGPU_MEMORY_MB
        value: "4096"
      - key: REDIS_URL
        fromService:
          name: nexus-ai-redis
          type: redis
          property: connectionString
      - fromGroup: nexus-ai-secrets

  # ══════════════════════════════════════════════════════════════
  # AI / ML INFERENCE SERVICE
  # ══════════════════════════════════════════════════════════════

  # ── AI Inference (Pool Analysis, Predictions, Scoring) ──────────
  - type: worker
    name: nexus-ai-inference
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python nexus/services/ai_inference_service.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SERVICE_PORT
        value: "8001"
      - key: SERVICE_ROLE
        value: "ai_inference"
      - key: MODEL_CACHE_SIZE
        value: "100"
      - key: PREDICTION_BATCH_SIZE
        value: "50"
      - key: POOL_REFRESH_INTERVAL
        value: "300"
      - key: REDIS_URL
        fromService:
          name: nexus-ai-redis
          type: redis
          property: connectionString
      - fromGroup: nexus-ai-secrets

  # ══════════════════════════════════════════════════════════════
  # BLOCKCHAIN SERVICE
  # ══════════════════════════════════════════════════════════════

  # ── Blockchain (Low-Latency RPC Connections) ────────────────────
  - type: worker
    name: nexus-ai-blockchain
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python nexus/services/blockchain_service.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SERVICE_PORT
        value: "8002"
      - key: SERVICE_ROLE
        value: "blockchain"
      - key: MAX_CONNECTIONS_PER_CHAIN
        value: "5"
      - key: LATENCY_CHECK_INTERVAL
        value: "15"
      - key: REQUEST_TIMEOUT
        value: "10"
      - key: ENABLE_WEBSOCKET
        value: "true"
      - key: REDIS_URL
        fromService:
          name: nexus-ai-redis
          type: redis
          property: connectionString
      - fromGroup: nexus-ai-secrets

  # ══════════════════════════════════════════════════════════════
  # MONITORING SERVICE
  # ══════════════════════════════════════════════════════════════

  # ── Real-Time Monitoring ────────────────────────────────────────
  - type: worker
    name: nexus-ai-monitoring
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python nexus/services/monitoring_service.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SERVICE_PORT
        value: "8003"
      - key: SERVICE_ROLE
        value: "monitoring"
      - key: METRICS_RETENTION_HOURS
        value: "168"
      - key: ALERT_CHECK_INTERVAL
        value: "60"
      - key: DASHBOARD_REFRESH_SECONDS
        value: "5"
      - key: REDIS_URL
        fromService:
          name: nexus-ai-redis
          type: redis
          property: connectionString
      - fromGroup: nexus-ai-secrets

  # ══════════════════════════════════════════════════════════════
  # REDIS (SHARED STATE)
  # ══════════════════════════════════════════════════════════════

  # ── Redis (shared state + ML model cache) ───────────────────────
  - type: redis
    name: nexus-ai-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # only allow access from private network (Render services)

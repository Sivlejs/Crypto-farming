envVarGroups:
  - name: nexus-ai-secrets
    envVars:
      - key: WALLET_ADDRESS
        sync: false
      - key: WALLET_PRIVATE_KEY
        sync: false
      - key: ETH_RPC_URL
        sync: false
      - key: BSC_RPC_URL
        sync: false
      - key: POLYGON_RPC_URL
        sync: false
      - key: FLASHBOTS_SIGNING_KEY
        sync: false
      - key: COINBASE_API_KEY
        sync: false
      - key: COINBASE_API_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

services:
  # ── Web Dashboard + API ──────────────────────────────────────
  - type: web
    name: nexus-ai-web
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn.conf.py app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: PORT
        value: "10000"
      - fromGroup: nexus-ai-secrets

  # ── Background Worker (the actual farming bot) ────────────────
  - type: worker
    name: nexus-ai-worker
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: python nexus/worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - fromGroup: nexus-ai-secrets

  # ── Redis (shared state + ML model cache) ─────────────────────
  - type: redis
    name: nexus-ai-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # only allow access from private network (Render services)

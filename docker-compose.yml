version: "3.9"

# ══════════════════════════════════════════════════════════════
#  Nexus AI — Scalable Microservices Architecture
#  
#  Services:
#    1. redis         - Shared state + ML model cache
#    2. web           - Dashboard + REST API
#    3. worker        - Core farming bot execution
#    4. ai-inference  - AI/ML model serving (pool analysis, predictions)
#    5. blockchain    - Low-latency blockchain connections
#    6. monitoring    - Real-time metrics & alerting
#
#  Run: docker-compose up -d
#  Scale: docker-compose up -d --scale ai-inference=2
# ══════════════════════════════════════════════════════════════

services:

  # ══════════════════════════════════════════════════════════════
  # CORE INFRASTRUCTURE
  # ══════════════════════════════════════════════════════════════

  # ── Redis (High-Performance State Store) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server 
      --maxmemory 512mb 
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-internal

  # ══════════════════════════════════════════════════════════════
  # WEB LAYER
  # ══════════════════════════════════════════════════════════════

  # ── Web Dashboard + API Gateway ─────────────────────────────
  web:
    build: .
    container_name: nexus-web
    restart: unless-stopped
    command: gunicorn --config gunicorn.conf.py app:app
    ports:
      - "10000:10000"
    env_file:
      - .env
    environment:
      - PORT=10000
      - REDIS_URL=redis://redis:6379/0
      - AI_INFERENCE_URL=http://ai-inference:8001
      - BLOCKCHAIN_URL=http://blockchain:8002
      - MONITORING_URL=http://monitoring:8003
      - SERVICE_ROLE=web
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nexus-internal
      - nexus-external
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"

  # ══════════════════════════════════════════════════════════════
  # CORE SERVICES
  # ══════════════════════════════════════════════════════════════

  # ── Background Worker (Core Farming Execution) ──────────────
  worker:
    build: .
    container_name: nexus-worker
    restart: unless-stopped
    command: python nexus/worker.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AI_INFERENCE_URL=http://ai-inference:8001
      - BLOCKCHAIN_URL=http://blockchain:8002
      - SERVICE_ROLE=worker
    depends_on:
      redis:
        condition: service_healthy
      ai-inference:
        condition: service_started
      blockchain:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "3G"

  # ══════════════════════════════════════════════════════════════
  # AI / ML INFERENCE SERVICE
  # ══════════════════════════════════════════════════════════════

  # ── AI Inference (Pool Analysis, Predictions, Scoring) ──────
  ai-inference:
    build: .
    container_name: nexus-ai-inference
    restart: unless-stopped
    command: python nexus/services/ai_inference_service.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_PORT=8001
      - SERVICE_ROLE=ai_inference
      # AI-specific settings
      - MODEL_CACHE_SIZE=100
      - PREDICTION_BATCH_SIZE=50
      - POOL_REFRESH_INTERVAL=300
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./data/models:/app/models
    ports:
      - "8001:8001"
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "4G"
        reservations:
          cpus: "1.0"
          memory: "2G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════
  # BLOCKCHAIN ACCESS SERVICE
  # ══════════════════════════════════════════════════════════════

  # ── Blockchain (Low-Latency RPC Connections) ────────────────
  blockchain:
    build: .
    container_name: nexus-blockchain
    restart: unless-stopped
    command: python nexus/services/blockchain_service.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_PORT=8002
      - SERVICE_ROLE=blockchain
      # Connection optimization
      - MAX_CONNECTIONS_PER_CHAIN=5
      - LATENCY_CHECK_INTERVAL=15
      - REQUEST_TIMEOUT=10
      - ENABLE_WEBSOCKET=true
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8002:8002"
    networks:
      - nexus-internal
      - nexus-external
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: "2G"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════
  # MONITORING & OBSERVABILITY
  # ══════════════════════════════════════════════════════════════

  # ── Real-Time Monitoring Service ────────────────────────────
  monitoring:
    build: .
    container_name: nexus-monitoring
    restart: unless-stopped
    command: python nexus/services/monitoring_service.py
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_PORT=8003
      - SERVICE_ROLE=monitoring
      # Monitoring settings
      - METRICS_RETENTION_HOURS=168
      - ALERT_CHECK_INTERVAL=60
      - DASHBOARD_REFRESH_SECONDS=5
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8003:8003"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - nexus-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ══════════════════════════════════════════════════════════════
  # OPTIONAL: OBSERVABILITY STACK
  # ══════════════════════════════════════════════════════════════

  # ── Prometheus (Metrics Collection) ─────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - nexus-internal
    profiles:
      - observability

  # ── Grafana (Visualization) ─────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nexus-admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - nexus-internal
    profiles:
      - observability

# ══════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════

networks:
  nexus-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16
  nexus-external:
    driver: bridge

# ══════════════════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════════════════

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

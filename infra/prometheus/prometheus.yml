global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "vgpu-api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: "vgpu-workers"
    static_configs:
      - targets: ["host.docker.internal:9100"]
    metrics_path: /metrics

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  # ── API ─────────────────────────────────────────────────────
  api:
    name: API (lint + test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest tests/ -v

  # ── Worker ──────────────────────────────────────────────────
  worker:
    name: Worker (lint + test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest tests/ -v

  # ── Web ─────────────────────────────────────────────────────
  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ── Docker Compose ──────────────────────────────────────────
  compose:
    name: docker compose (api + infra)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Start infra stack (postgres + redis + prometheus + grafana only)
        run: |
          docker compose -f infra/docker-compose.yml up -d postgres redis prometheus grafana
          sleep 20
          docker compose -f infra/docker-compose.yml ps
      - name: Check postgres is healthy
        run: docker compose -f infra/docker-compose.yml exec -T postgres pg_isready -U vgpu
      - name: Stop stack
        run: docker compose -f infra/docker-compose.yml down -v
